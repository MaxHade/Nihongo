<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#e74c3c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Nihongo – Japanisch Lernen</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
</head>
<body>
  <header id="app-header">
    <h1 id="header-title">Nihongo</h1>
    <button id="theme-toggle" aria-label="Dark/Light Mode umschalten">🌙</button>
  </header>

  <main id="app-main">
    <!-- Dashboard View -->
    <section id="view-dashboard" class="view active">
      <div id="dashboard-header" class="dashboard-header"></div>
      <h2>Kategorien</h2>
      <div id="category-grid" class="category-grid"></div>
    </section>

    <!-- Subcategory View -->
    <section id="view-subcategory" class="view">
      <button class="back-btn" data-back="dashboard">← Zurück</button>
      <h2 id="subcategory-title"></h2>
      <div id="subcategory-grid" class="category-grid"></div>
    </section>

    <!-- Flashcard View -->
    <section id="view-flashcard" class="view">
      <button class="back-btn" id="flashcard-back">← Zurück</button>
      <div id="flashcard-header">
        <span id="flashcard-progress">0 / 0</span>
        <label id="error-mode-label">
          <input type="checkbox" id="error-mode-toggle"> Nur Nochmal
        </label>
      </div>
      <div id="flashcard-container">
        <div id="flashcard" class="flashcard">
          <div id="card-front" class="card-front"></div>
          <div id="card-hint" class="card-hint"></div>
          <div style="display:flex;gap:8px;align-items:center;">
            <button id="card-audio" class="audio-btn" aria-label="Aussprechen">🔊</button>
            <button id="card-stroke-btn" class="audio-btn hidden" aria-label="Strichfolge">筆</button>
          </div>
        </div>
        <div id="answer-section">
          <form id="answer-form">
            <input type="text" id="answer-input" placeholder="Antwort eingeben..." autocomplete="off" autocapitalize="off" spellcheck="false">
            <button type="submit" id="check-btn">Prüfen</button>
          </form>
          <button id="reveal-btn" class="primary-btn hidden">Aufdecken</button>
          <div id="answer-result" class="answer-result hidden"></div>
          <div id="rating-buttons" class="rating-buttons hidden">
            <button class="rate-btn rate-again" data-rating="again">Nochmal</button>
            <button class="rate-btn rate-easy" data-rating="easy">Einfach</button>
          </div>
        </div>
      </div>
      <!-- Session Summary -->
      <div id="session-summary" class="session-summary hidden">
        <h3>Zusammenfassung</h3>
        <div id="summary-stats"></div>
        <button id="summary-restart" class="primary-btn">Nochmal üben</button>
        <button id="summary-back" class="secondary-btn">Zurück</button>
      </div>
    </section>

    <!-- List View -->
    <section id="view-list" class="view">
      <button class="back-btn" id="list-back">← Zurück</button>
      <h2 id="list-title"></h2>
      <input type="text" id="list-search" placeholder="Suchen..." autocomplete="off">
      <label id="romaji-toggle-label"><input type="checkbox" id="romaji-toggle" checked> Romaji anzeigen</label>
      <div id="list-content"></div>
    </section>

    <!-- Grammar Text View -->
    <section id="view-grammar-text" class="view">
      <button class="back-btn" id="grammar-text-back">← Zurück</button>
      <h2 id="grammar-text-title"></h2>
      <div id="grammar-text-content" class="grammar-text-content"></div>
    </section>

    <!-- Grammar Playlist View -->
    <section id="view-grammar-playlist" class="view">
      <button class="back-btn" id="grammar-playlist-back">← Zurück</button>
      <h2>Grammatik Audio</h2>
      <div id="playlist-player" class="playlist-player">
        <div id="playlist-track-title" class="playlist-track-title">Kein Track geladen</div>
        <div class="playlist-controls">
          <button id="playlist-prev" class="playlist-btn">◁◁</button>
          <button id="playlist-play" class="playlist-btn playlist-play-btn">▶</button>
          <button id="playlist-next" class="playlist-btn">▷▷</button>
        </div>
        <div class="playlist-progress-container" id="playlist-progress-container">
          <span id="playlist-time-current">0:00</span>
          <div class="playlist-progress-bar" id="playlist-progress-bar">
            <div class="playlist-progress-fill" id="playlist-progress-fill"></div>
          </div>
          <span id="playlist-time-total">0:00</span>
        </div>
      </div>
      <div id="playlist-tracklist" class="playlist-tracklist"></div>
    </section>

    <!-- Stats View -->
    <section id="view-stats" class="view">
      <h2>Statistiken</h2>
      <div id="stats-today" class="stats-section">
        <h3>Heute</h3>
        <div id="stats-today-content"></div>
      </div>
      <div id="stats-week" class="stats-section">
        <h3>Letzte 7 Tage</h3>
        <div id="stats-week-chart"></div>
      </div>
      <div id="stats-heatmap" class="stats-section">
        <h3>Lern-Kalender</h3>
        <div id="stats-heatmap-content"></div>
      </div>
      <div id="stats-overall" class="stats-section">
        <h3>Gesamt</h3>
        <div id="stats-overall-content"></div>
      </div>
      <div id="stats-categories" class="stats-section">
        <h3>Pro Kategorie</h3>
        <div id="stats-categories-content"></div>
      </div>
      <div class="stats-section">
        <h3>Daten</h3>
        <div class="data-actions">
          <button id="export-btn" class="secondary-btn">Daten exportieren</button>
          <button id="import-btn" class="secondary-btn">Daten importieren</button>
          <input type="file" id="import-file" accept=".json" class="hidden">
        </div>
      </div>
    </section>
  </main>

  <nav id="bottom-nav">
    <button class="nav-btn active" data-view="dashboard">
      <span class="nav-icon">📚</span>
      <span class="nav-label">Üben</span>
    </button>
    <button class="nav-btn" data-view="list-overview">
      <span class="nav-icon">📋</span>
      <span class="nav-label">Lernen</span>
    </button>
    <button class="nav-btn" data-view="stats">
      <span class="nav-icon">📊</span>
      <span class="nav-label">Statistik</span>
    </button>
  </nav>

  <div id="stroke-modal" class="stroke-modal hidden">
    <div class="stroke-modal-content">
      <button id="stroke-close" class="stroke-close">&times;</button>
      <h3>Strichfolge</h3>
      <div id="stroke-container"></div>
      <button id="stroke-replay" class="secondary-btn">Wiederholen</button>
    </div>
  </div>

  <div id="confetti-container"></div>

  <!-- Scripts: data first, then modules, then app -->
  <script src="data/hiragana.js"></script>
  <script src="data/katakana.js"></script>
  <script src="data/dates.js"></script>
  <script src="data/times.js"></script>
  <script src="data/numbers.js"></script>
  <script src="data/vocabulary.js"></script>
  <script src="data/particles.js"></script>
  <script src="data/greetings.js"></script>
  <script src="data/lessons.js"></script>
  <script src="data/kanji.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/flashcard.js"></script>
  <script src="js/speech.js"></script>
  <script src="js/stats.js"></script>
  <script src="data/grammar.js"></script>
  <script src="js/playlist.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
